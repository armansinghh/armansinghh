name: Generate Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate pacman graph
        uses: Platane/snk@v3
        with:
          github_user_name: armansinghh
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#f2c94c&color_dots=#ebedf0,#c6e48b,#7bc96f,#239a3b,#196127
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f2c94c

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
